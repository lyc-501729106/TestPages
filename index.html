<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>选择主体类型</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #999;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .type-item {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      text-align: center;
      padding: 16px 0;
      font-size: 20px;
      color: #4b5563;
      cursor: pointer;
      transition: all 0.2s;
    }
    .type-item.active {
      border-color: #2563eb;
      background: #f8fafc;
    }
    .confirm-btn {
      background-color: #2563eb;
      color: white;
      border-radius: 8px;
      text-align: center;
      padding: 18px 0;
      font-size: 22px;
      font-weight: 500;
      border: none;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="w-[88%] max-w-[420px] bg-white rounded-xl p-8">
  <h2 class="text-[28px] font-medium text-gray-900 mb-8">选择主体类型</h2>

  <!-- 主体选项容器 -->
  <div class="flex flex-col gap-4 mb-6">
    <div class="type-item active" data-type="micro">小微</div>
    <div class="type-item" data-type="individual">个体户</div>
    <div class="type-item" data-type="company">企业</div>
  </div>

  <!-- 底部提示文字 -->
  <p id="tip-text" class="text-gray-500 text-lg mb-8">身份证即可开通。</p>

  <!-- 确认按钮 -->
  <button class="confirm-btn" id="confirmBtn">确认</button>
</div>

<script>
  // 元素获取
  const typeItems = document.querySelectorAll('.type-item');
  const tipText = document.getElementById('tip-text');
  const confirmBtn = document.getElementById('confirmBtn');

  // 不同主体对应提示文案
  const tipMap = {
    micro: '身份证即可开通。',
    individual: '需您提供本人名下有效营业执照。',
    company: '需您提供本人名下有效营业执照。'
  };

  let selectedType = 'micro'; // 默认选中小微

  // 切换选中状态与提示文字
  typeItems.forEach(item => {
    item.addEventListener('click', () => {
      // 清除全部激活
      typeItems.forEach(i => i.classList.remove('active'));
      // 当前选中
      item.classList.add('active');
      selectedType = item.dataset.type;
      tipText.innerText = tipMap[selectedType];
    });
  });

  // 确认按钮点击：跳转微信小程序
  confirmBtn.addEventListener('click', () => {
    // 方式1：微信环境内直接跳转小程序（推荐微信浏览器打开）
    // 替换为你的小程序原始ID、路径
    

    const appid = 'wxa47c8db623796050';
    const page = 'pages/form/form'; // 信息收集页路径
    const envVersion = 'develop'; // 开发版develop，体验版trial，正式版release

    const query = `type=${selectedType}`;
    const jumpUrl = `weixin://dl/business/?appid=${appid}&path=${page}&env_version=${envVersion}`;


    // 判断是否在微信内置浏览器
    const isWechat = navigator.userAgent.toLowerCase().indexOf('micromessenger') !== -1;
    if (isWechat) {
      // 微信跳转小程序API
      window.location.href = jumpUrl;
    } else {
      // 外部浏览器：展示小程序码提示，或跳转公众号/下载微信
      alert('请在微信内打开页面');
    }
  });
</script>
</body>
</html>
