<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>进件类型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #b8b8b8;
            -webkit-tap-highlight-color: transparent;
        }

        /* 顶部导航栏 */
        .page-header {
            position: relative;
            background: #f0f0f0;
            padding: 14px 16px;
            text-align: center;
        }
        .close-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
            color: #222;
            line-height: 1;
            cursor: pointer;
        }
        .header-title {
            font-size: 22px;
            font-weight: 500;
            color: #222;
        }
        .header-domain {
            font-size: 15px;
            color: #666;
            margin-top: 3px;
        }
        .more-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            color: #222;
            letter-spacing: 2px;
        }

        /* 中间弹窗 */
        .select-modal {
            width: 86%;
            max-width: 420px;
            margin: 130px auto 0;
            background: #ffffff;
            border-radius: 14px;
            padding: 28px 22px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .modal-title {
            font-size: 24px;
            font-weight: 500;
            color: #222;
            margin-bottom: 22px;
        }
        .option-item {
            width: 100%;
            padding: 16px 0;
            margin-bottom: 18px;
            background: #f2f3f5;
            border: none;
            border-radius: 8px;
            font-size: 22px;
            color: #333;
            text-align: center;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        /* 选中状态样式 */
        .option-item.active {
            background: #5a8cff;
            color: #ffffff;
        }
        .option-item:last-of-type {
            margin-bottom: 26px;
        }
        .confirm-btn {
            width: 100%;
            padding: 16px 0;
            background: #5a8cff;
            border: none;
            border-radius: 8px;
            font-size: 22px;
            color: #ffffff;
            text-align: center;
            cursor: pointer;
            font-family: inherit;
        }
        .confirm-btn:active {
            opacity: 0.85;
        }
    </style>
</head>
<body>
   

    <!-- 选择弹窗 -->
    <div class="select-modal">
        <div class="modal-title">选择主体类型</div>
        <button class="option-item" data-type="xiaowei">小微</button>
        <button class="option-item" data-type="getihu">个体户</button>
        <button class="option-item" data-type="qiye">企业</button>
        <button class="confirm-btn">确认</button>
    </div>

    <script>
        const options = document.querySelectorAll('.option-item');
        const confirmBtn = document.querySelector('.confirm-btn');
        let selectedType = '';

        // 单选切换选中状态
        options.forEach(option => {
            option.addEventListener('click', function() {
                // 移除所有选中状态
                options.forEach(item => item.classList.remove('active'));
                // 给当前点击项添加选中状态
                this.classList.add('active');
                // 记录选中的类型
                selectedType = this.getAttribute('data-type');
            });
        });

        // 关闭按钮
        document.querySelector('.close-btn').addEventListener('click', function(){
            history.back();
        });

        // 确认按钮跳转小程序
        confirmBtn.addEventListener('click', function() {
            if (!selectedType) {
                alert('请先选择主体类型');
                return;
            }

            // ========== 请替换为你的小程序信息 ==========
            const appid = '你的小程序AppID';
            const page = 'pages/collect/index'; // 信息收集页路径
            const envVersion = 'develop'; // 开发版develop，体验版trial，正式版release
            // ==========================================

            // 拼接跳转参数，把选中的类型传给小程序
            const query = `type=${selectedType}`;
            // 构造微信跳转链接
            const jumpUrl = `weixin://dl/business/?appid=${appid}&page=${page}&query=${encodeURIComponent(query)}&env_version=${envVersion}`;
            
            // 执行跳转
            window.location.href = jumpUrl;
        });
    </script>
</body>
</html>
